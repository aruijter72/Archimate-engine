name: Generate ArchiMate Artefacts & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write      # needed to commit generated files back to main
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ── Python setup ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install openpyxl lxml pandas

      # ── Choose input source ───────────────────────────────────────────
      # Koppelregister takes priority when present; model-input.xlsx is fallback
      - name: Select input source
        id: changes
        run: |
          if [ -f "Koppelregister_v1.xlsx" ]; then
            echo "use_koppel=true" >> $GITHUB_OUTPUT
          else
            echo "use_koppel=false" >> $GITHUB_OUTPUT
          fi

      # ── Generate model from Koppelregister (preferred) ────────────────
      - name: Generate model.archimate from Koppelregister
        if: steps.changes.outputs.use_koppel == 'true'
        run: |
          echo "Koppelregister found — regenerating model.archimate ..."
          python scripts/generate_model_koppelregister.py

      # ── Generate model from model-input.xlsx (fallback) ───────────────
      - name: Generate model.archimate from Excel
        if: steps.changes.outputs.use_koppel != 'true'
        run: |
          echo "No Koppelregister — falling back to model-input.xlsx ..."
          python scripts/generate_model.py

      # ── Always regenerate HTML from current model.archimate ───────────
      - name: Generate HTML viewer
        run: python scripts/generate_html.py

      # ── Commit model.archimate back to main (only when regenerated) ───
      # docs/index.html is NOT committed — it goes directly to Pages to avoid conflicts
      - name: Commit model.archimate
        if: always()
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add model.archimate
          if git diff --staged --quiet; then
            echo "No changes to model.archimate."
          else
            git commit -m "chore: regenerate model.archimate from Excel [skip ci]"
            git pull --rebase origin main
            git push
          fi

      # ── Deploy docs/ to GitHub Pages ──────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # automatically enables Pages if not yet configured

      - name: Upload Pages artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
